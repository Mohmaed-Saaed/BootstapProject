<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Shopping</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
      <a class="navbar-brand font-weight-bold" href="index.html">Shopping</a>
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#nav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="Product.html">Products</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="Index.html">Home</a>
          </li>
        </ul>
        <div class="d-flex">
          <a href="cart.html" class="btn btn-outline-light btn-sm mr-2">
            <i class="bi bi-cart3"></i> Cart
            <span class="badge badge-danger ml-1"></span>
          </a>
          <a href="login.html" class="btn btn-danger btn-sm active">
            <i class="bi bi-person"></i> Login
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white text-center py-3">
              <h5 class="mb-0 font-weight-bold">Welcome Back</h5>
            </div>
            <div class="card-body p-4">
              <form id="loginForm">
                <div class="form-group">
                  <label class="font-weight-bold small">Email Address</label>
                  <div class="input-group">
                    <div class="input-group-prepend">
                      <span class="input-group-text bg-white"
                        ><i class="bi bi-envelope text-muted"></i
                      ></span>
                    </div>
                    <input
                      type="email"
                      class="form-control"
                      placeholder="Email@example.com"
                      required
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label class="font-weight-bold small">Password</label>
                  <div class="input-group">
                    <div class="input-group-prepend">
                      <span class="input-group-text bg-white"
                        ><i class="bi bi-lock text-muted"></i
                      ></span>
                    </div>
                    <input
                      type="password"
                      class="form-control"
                      id="passwordInput"
                      placeholder="Enter your password"
                      required
                    />
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-danger btn-block font-weight-bold"
                >
                  <i class="bi bi-box-arrow-in-right mr-1"></i> Login
                </button>

                <hr class="my-3" />

                <p class="text-center text-muted small mb-0">
                  Don't have an account?
                  <a href="#" class="text-danger font-weight-bold">Sign up</a>
                </p>
              </form>

              <div id="loginAlert" class="alert mt-3 d-none" role="alert"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"></script>
    <script type="module">
      import { getTotalQtyItems } from "./Helper.js";
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const alert = document.getElementById("loginAlert");
        alert.className = "alert alert-success mt-3";
        alert.innerHTML =
          '<i class="bi bi-check-circle mr-1"></i> Login successful! Redirecting…';
        alert.classList.remove("d-none");
        setTimeout(() => (window.location.href = "Index.html"), 1500);
      });
      document.querySelector(".badge").textContent = getTotalQtyItems();
    </script>
  </body>
</html>
