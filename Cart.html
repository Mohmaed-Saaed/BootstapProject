<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart – Shopping</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
      <a class="navbar-brand font-weight-bold" href="Index.html">Shopping</a>
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#nav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="Product.html">Products</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="Index.html">Home</a>
          </li>
        </ul>
        <div class="d-flex gap-2">
          <a href="cart.html" class="btn btn-outline-light btn-sm mr-2">
            <i class="bi bi-cart3"></i> Cart
            <span class="badge badge-danger ml-1" id="cartCount">0</span>
          </a>
          <a href="Login.html" class="btn btn-danger btn-sm">
            <i class="bi bi-person"></i> Login
          </a>
        </div>
      </div>
    </nav>

    <div class="bg-dark text-white py-4">
      <div class="container">
        <h2 class="font-weight-bold mb-0">
          <i class="bi bi-cart3 mr-2"></i>Your Cart
        </h2>
      </div>
    </div>

    <div class="container py-5">
      <div class="row">
        <div class="col-lg-8 mb-4">
          <div class="card shadow-sm border-0">
            <div class="card-body p-0">
              <div id="emptyCart" class="text-center py-5 d-none">
                <i class="bi bi-cart-x text-muted" style="font-size: 3rem"></i>
                <h5 class="mt-3 text-muted">Your cart is empty</h5>
                <p class="text-muted small">
                  Looks like you haven't added anything yet.
                </p>
                <a href="Product.html" class="btn btn-danger mt-2"
                  >Continue Shopping</a
                >
              </div>

              <table
                class="table table-bordered text-center mb-0"
                id="cartTable"
              >
                <thead class="thead-dark">
                  <tr>
                    <th class="text-left">Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="cartItems"></tbody>
              </table>
            </div>
          </div>

          <div class="d-flex justify-content-between mt-3">
            <a href="Product.html" class="btn btn-outline-dark btn-sm">
              <i class="bi bi-arrow-left mr-1"></i> Continue Shopping
            </a>
            <button class="btn btn-outline-danger btn-sm" id="clearCart">
              <i class="bi bi-trash mr-1"></i> Clear Cart
            </button>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white font-weight-bold">
              Order Summary
            </div>
            <div class="card-body">
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Subtotal</span>
                <span>$<span id="subtotal">0.00</span></span>
              </div>

              <hr />
              <div
                class="d-flex justify-content-between font-weight-bold h5 mb-3"
              >
                <span>Total</span>
                <span class="text-danger">$<span id="total">0.00</span></span>
              </div>

              <button
                id="Checkout"
                class="btn btn-danger btn-block font-weight-bold"
              >
                <i class="bi bi-credit-card mr-1"></i> Checkout
              </button>
              <div id="loginAlert" class="alert mt-3 d-none" role="alert"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"></script>
    <script>
      let cart = JSON.parse(localStorage.getItem("cart"));

      function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
      }

      function renderCart() {
        const tbody = document.getElementById("cartItems");
        const subtotalEl = document.getElementById("subtotal");
        const totalEl = document.getElementById("total");
        const countEl = document.getElementById("cartCount");
        const emptyDiv = document.getElementById("emptyCart");
        const tableEl = document.getElementById("cartTable");

        tbody.innerHTML = "";

        if (cart.length === 0) {
          emptyDiv.classList.remove("d-none");
          tableEl.classList.add("d-none");
          subtotalEl.textContent = "0.00";
          totalEl.textContent = "0.00";
          countEl.textContent = "0";
          return;
        }

        emptyDiv.classList.add("d-none");
        tableEl.classList.remove("d-none");

        let subtotal = 0;
        let totalQty = 0;

        cart.forEach((item, i) => {
          const sub = item.price * item.qty;
          subtotal += sub;
          totalQty += item.qty;

          tbody.innerHTML += `
            <tr>
              <td class="text-left align-middle">${item.title}</td>
              <td class="align-middle">$${item.price.toFixed(2)}</td>
              <td class="align-middle" style="width:120px;">
                <div class="input-group input-group-sm justify-content-center">
                  <div class="input-group-prepend">
                    <button class="btn btn-outline-secondary btn-sm" onclick="changeQty(${i}, -1)">−</button>
                  </div>
                  <input type="text" class="form-control text-center" value="${item.qty}" readonly style="max-width:40px;"/>
                  <div class="input-group-append">
                    <button class="btn btn-outline-secondary btn-sm" onclick="changeQty(${i}, 1)">+</button>
                  </div>
                </div>
              </td>
              <td class="align-middle font-weight-bold">$${sub.toFixed(2)}</td>
              <td class="align-middle">
                <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${i})">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          `;
        });

        const shipping = subtotal >= 50 ? 0 : 5.99;
        const total = subtotal + shipping;

        subtotalEl.textContent = subtotal.toFixed(2);
        totalEl.textContent = total.toFixed(2);
        countEl.textContent = totalQty;
      }

      function changeQty(index, delta) {
        cart[index].qty = Math.max(1, cart[index].qty + delta);
        saveCart();
        renderCart();
      }

      function removeItem(index) {
        cart.splice(index, 1);
        saveCart();
        renderCart();
      }

      document.getElementById("clearCart").addEventListener("click", () => {
        cart = [];
        saveCart();
        renderCart();
      });

      renderCart();

      document.getElementById("Checkout").addEventListener("click", () => {
        const alert = document.getElementById("loginAlert");

        alert.classList.remove("d-none");

        if (cart.length === 0) {
          alert.className = "alert alert-warning mt-3";
          alert.innerHTML =
            '<i class="bi bi-exclamation-circle mr-1"></i> Your cart is empty!';
        } else {
          alert.className = "alert alert-success mt-3";
          cart = [];
          saveCart();

          alert.innerHTML =
            '<i class="bi bi-check-circle mr-1"></i> Checkout successful!';
          setTimeout(() => (window.location.href = "Index.html"), 1500);
        }
      });
    </script>
  </body>
</html>
